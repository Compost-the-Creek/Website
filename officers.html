<!doctype html>
<html>

<head>
  <title>Officers</title>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@700&display=swap" rel="stylesheet">
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700' rel='stylesheet' type='text/css'>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  
  <!--Main .js-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/custom.js"></script>

  <!--Lit element .js-->
  <script type="module" src="js/lit-elements/wide-header.js"></script>

  <style>
    .menu-index {
      color: rgb(255, 255, 255) !important;
      opacity: 1 !important;
      font-weight: 700 !important;
    }
  </style>
</head>

<!--TO-DO: ADD CROPPING IN CUSTOM.CSS-->

<body>
  <!--<header><div class="menu-container"></div></header>-->
  <div class="content-container">
    <header class="menu-container"></header>
    <div class="content">
      <div class="content-table flex-column">
        <!--Start Officers-->
        <div class="flex-row">
          <div class="flex-item flex-header">
            <h1 id="partnerships" style="text-align: center;">Officers</h1>
            <hr>
          </div>
        </div>
         <!--P & VP Row-->
        <div class="gallery add-top-margin-small add-bottom-margin-small">

          <!--President-->
          <div class="president">
            <div class="crop-container" style="--crop-width: 300px; --crop-height: 300px;">
              <img src="img/officers/jaden-nguyen.PNG" alt="Jaden Nguyen - President"/>
            </div>
            <div style="text-align: center;">Jaden Nguyen<br>President</div>
          </div>
          
          <!--Vice President-->
          <div class="vice-president">
            <div class="crop-container" style="--crop-width: 300px; --crop-height: 300px;">
              <img src="img/officers/ryan-lee.jpg" alt="Ryan Lee - Vice President"/>
            </div>
            <div style="text-align: center;">Ryan Lee<br>Vice President</div>
          </div>

        </div>

        <!--Exec Row 1-->
        <div class="gallery add-top-margin-small add-bottom-margin-small">

          <!--Director of External Affairs-->
          <div class="director-external-affiars" style="padding-left: 10px; padding-right: 10px;">
            <div class="crop-container" style="--crop-width: 150px; --crop-height: 300px;">
              <img src="img/officers/bhagwant-sandhu.PNG" alt="Bhagwant Sandhu - Director of External Affairs"/>
            </div>
            <div style="text-align: center;">Bhagwant Sandhu<br>Director of External Affairs</div>
          </div>

          <!--Director of Finance-->
          <div class="director-finance style="padding-left: 10px; padding-right: 10px;">
            <div class="crop-container" style="--crop-width: 150px; --crop-height: 300px;">
              <img src="img/officers/harshith-yendru.JPEG" alt="Harshith Yendru - Director of Finance"/>
            </div>
            <div style="text-align: center;">Harshith Yendru<br>Director of Finance</div>
          </div>

          <!--Director of Administration-->
          <div class="director-administration style="padding-left: 10px; padding-right: 10px;">
            <div class="crop-container" style="--crop-width: 150px; --crop-height: 300px;">
              <img src="img/officers/matthew-lim.jpeg" alt="Matthew Lim - Director of Administration"/>
            </div>
            <div style="text-align: center;">Matthew Lim<br>Director of Administration</div>
          </div>

        </div>

        <!--Exec Row 2-->
        <div class="gallery add-top-margin-small add-bottom-margin-small">
          <!--Director of Communications-->
          <div class="director-communications style="padding-left: 10px; padding-right: 10px;">
            <div class="crop-container" style="--crop-width: 150px; --crop-height: 300px;">
              <img src="img/officers/justin-lumbab.png" alt="Justin Lumbab - Director of Communications"/>
            </div>
            <div style="text-align: center;">Justin Lumbab<br>Director of Communications</div>
          </div>

          <!--Director of Diversity, Equity, and Inclusion-->
          <div class="director-dei style="padding-left: 10px; padding-right: 10px;">
            <div class="crop-container" style="--crop-width: 150px; --crop-height: 300px;">
              <img src="img/officers/chloe-kim.jpeg" alt="Chloe Kim - Director of Diversity, Equity, and Inclusion"/>
            </div>
            <div style="text-align: center;">Chloe Kim<br>Director of Diversity, Equity, and Inclusion</div>
          </div>

        </div>
      </div>
    </div>
    <footer class="footer-container"></footer>
  </div>
  <!--<footer><div class="footer-container"></div></footer>-->
</body>

</html>
